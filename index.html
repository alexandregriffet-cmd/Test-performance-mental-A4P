<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Mental A4P — Académie de Performances</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #0f2244;
    --navy-light: #2E5BA8;
    --accent: #4A90D9;
    --gold: #C9A84C;
    --white: #FFFFFF;
    --off-white: #F8F9FC;
    --gray: #6B7280;
    --light-gray: #E8EDF5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy-dark);
    min-height: 100vh;
    color: var(--white);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(74,144,217,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%),
      linear-gradient(135deg, #0f2244 0%, #1B3A6B 50%, #0f2244 100%);
    z-index: -1;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
